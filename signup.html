<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <title>Sign Up - Financial Solutions</title>
</head>

<body class="auth-body">
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <svg class="pl" width="240" height="240" viewBox="0 0 240 240">
            <circle class="pl__ring pl__ring--a" cx="120" cy="120" r="105" fill="none" stroke="#000" stroke-width="20"
                stroke-dasharray="0 660" stroke-dashoffset="-330" stroke-linecap="round"></circle>
            <circle class="pl__ring pl__ring--b" cx="120" cy="120" r="35" fill="none" stroke="#000" stroke-width="20"
                stroke-dasharray="0 220" stroke-dashoffset="-110" stroke-linecap="round"></circle>
            <circle class="pl__ring pl__ring--c" cx="85" cy="120" r="70" fill="none" stroke="#000" stroke-width="20"
                stroke-dasharray="0 440" stroke-linecap="round"></circle>
            <circle class="pl__ring pl__ring--d" cx="155" cy="120" r="70" fill="none" stroke="#000" stroke-width="20"
                stroke-dasharray="0 440" stroke-linecap="round"></circle>
        </svg>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <!-- Logo -->
            <a href="index.html" class="logo">
                <img src="whitelogo.webp" alt="CLEANFIN Logo" class="logo-image">
            </a>
            <div class="header-actions">
                <a href="index.html" class="btn-outline">Back to Home</a>
            </div>
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-card gs-fade-up">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join CLEANFIN to start managing your wealth.</p>
            </div>
            <form id="signupForm" class="modern-contact-form">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" placeholder="Create a strong password" required
                            minlength="8">
                        <i class="fas fa-eye toggle-password" data-target="signupPassword"></i>
                    </div>
                    <small class="form-hint">Must be at least 8 characters long.</small>
                </div>
                <div class="form-group">
                    <label for="signupConfirm">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="signupConfirm" placeholder="Confirm your password" required
                            minlength="8">
                        <i class="fas fa-eye toggle-password" data-target="signupConfirm"></i>
                    </div>
                    <div id="passwordMismatchError" class="error-text hidden">Passwords do not match.</div>
                </div>
                <button type="submit" class="btn-primary submit-btn">
                    CREATE ACCOUNT <i class="fas fa-user-plus"></i>
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="auth-link fw-bold">Sign In</a></p>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
